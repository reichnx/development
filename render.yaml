# render.yaml
services:
  - type: web
    name: facebook-share-tool
    runtime: node
    repo: https://github.com/yourusername/facebook-share-tool
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: JWT_SECRET
        value: your-secret-key-here
      - key: SESSION_SECRET
        value: your-session-secret-here
      - key: NODE_ENV
        value: production